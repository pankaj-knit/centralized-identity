server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/local-dev-(.*)-1"
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
    pipeline_stages:
      - json:
          expressions:
            trace_id: trace_id
            correlation_id: correlation_id
            level: level
            adapter: adapter
            msg: msg
      - labels:
          level:
          adapter:
          trace_id:
          correlation_id:
