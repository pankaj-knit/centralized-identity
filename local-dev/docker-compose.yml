services:
  # --- Identity Infrastructure ---

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8443:8080"
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - ./config/vault/policies:/vault/policies
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status || true"]
      interval: 5s
      timeout: 3s
      retries: 10

  opa:
    image: openpolicyagent/opa:0.62.1
    platform: linux/amd64
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ../policies:/policies:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # --- Observability ---

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
      - --web.enable-remote-write-receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Identity Fabric Services ---

  token-exchange:
    build:
      context: ../services/token-exchange
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      KEYCLOAK_URL: http://keycloak:8080
      OPA_URL: http://opa:8181
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      vault:
        condition: service_started
      keycloak:
        condition: service_started
      opa:
        condition: service_started
      jaeger:
        condition: service_started

  # --- Mock Legacy Services (for migration testing) ---

  legacy-jwt-app:
    build:
      context: ./mock-services/legacy-jwt-app
    ports:
      - "9001:9001"
    environment:
      PORT: "9001"
      TOKEN_EXCHANGE_URL: http://token-exchange:8080/v1/token/exchange

  opaque-token-app:
    build:
      context: ./mock-services/opaque-token-app
    ports:
      - "9002:9002"
    environment:
      PORT: "9002"
      TOKEN_EXCHANGE_URL: http://token-exchange:8080/v1/token/exchange
      REDIS_URL: redis://redis:6379

  saml-app:
    build:
      context: ./mock-services/saml-app
    ports:
      - "9003:9003"
    environment:
      PORT: "9003"
      TOKEN_EXCHANGE_URL: http://token-exchange:8080/v1/token/exchange

  keycloak-app:
    build:
      context: ./mock-services/keycloak-app
    ports:
      - "9004:9004"
    environment:
      PORT: "9004"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: identity-fabric
      KEYCLOAK_CLIENT_ID: sample-app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  keycloak-db-data:
  loki-data:
