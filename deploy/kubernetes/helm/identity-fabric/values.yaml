global:
  domain: identity-fabric.internal
  environment: dev

tokenExchange:
  replicaCount: 3
  image:
    repository: identity-fabric/token-exchange
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8080
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
  config:
    defaultTokenTTL: 300s
    pciTokenTTL: 60s
    jwksCacheTTL: 60s

policyEngine:
  replicaCount: 3
  image:
    repository: openpolicyagent/opa
    tag: 0.62.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    port: 8181

controlPlane:
  replicaCount: 2
  image:
    repository: identity-fabric/control-plane
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 8090

credentialManager:
  replicaCount: 2
  image:
    repository: identity-fabric/credential-manager
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8070

vault:
  enabled: false
  server:
    ha:
      enabled: true
      replicas: 3

keycloak:
  enabled: false

observability:
  prometheus:
    enabled: true
  grafana:
    enabled: true
    dashboards:
      identity-overview: true
      token-exchange-latency: true
      migration-tracker: true

networkPolicies:
  enabled: true
